<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>MiBiblioteca</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>📚 MiBiblioteca</h1>
        <p>Organizá tus libros favoritos</p>
    </header>

    <main>

        <form onsubmit="return guardarLibro()">

            <input
                type="text"
                id="titulo"
                placeholder="Título del libro">

        </form>

        <div id="mensaje"></div>

        <div id="resultado"></div>

    </main>

    <script src="script.js"></script>

</body>

</html>

<!-- ===================================================== -->

<!--              BIBLIOTECA DE COMPONENTES HTML               -->

<!-- Utilizar solamente los elementos necesarios -->

<!-- ===================================================== -->
<input
type="text"
id="autor"
placeholder="Autor">

<select id="genero">

<option>Novela</option>

<option>Historia</option>

<option>Ciencia ficción</option>

</select>

<input
type="submit"
value="Guardar libro">

<button
onclick="mostrarLibros()">

Ver recomendaciones

</button>

<div id="libros">

</div>

<footer>

MiBiblioteca 2026

</footer>
